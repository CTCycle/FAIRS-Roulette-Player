name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --extra test
      - name: Ruff
        run: uv run --extra test ruff check FAIRS/server tests
      - name: Unit tests
        run: uv run --extra test pytest -q tests/unit
      - name: OpenAPI check
        run: uv run --extra test python -c "from FAIRS.server.app import app; app.openapi()"
