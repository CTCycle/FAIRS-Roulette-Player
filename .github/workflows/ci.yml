name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python sanity check
        run: python -c "import sys; print('python', sys.version)"
